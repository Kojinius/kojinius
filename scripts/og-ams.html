<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&family=IBM+Plex+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #faf8f5;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 50% 50% at 10% 90%, rgba(208,32,32,0.06), transparent),
      radial-gradient(ellipse 40% 40% at 90% 10%, rgba(40,40,40,0.04), transparent);
  }
  .accent { position: absolute; left: 0; top: 0; width: 6px; height: 100%;
    background: linear-gradient(180deg, #D02020, #a01818, #D02020); }
  .container { position: relative; z-index: 1; display: flex; flex-direction: column;
    justify-content: center; height: 100%; padding: 60px 80px 60px 60px; margin-left: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 8px;
    background: rgba(208,32,32,0.08); border: 1px solid rgba(208,32,32,0.2);
    border-radius: 999px; padding: 8px 20px; width: fit-content; margin-bottom: 24px; }
  .badge span { font-family: 'IBM Plex Mono', monospace; font-size: 14px;
    font-weight: 500; color: #D02020; letter-spacing: 0.08em; text-transform: uppercase; }
  h1 { font-family: 'Outfit', sans-serif; font-size: 48px; font-weight: 900;
    color: #1a1a1a; line-height: 1.2; margin-bottom: 16px; letter-spacing: -0.02em; }
  h1 em { font-style: normal; color: #D02020; }
  .sub { font-size: 18px; color: #666; line-height: 1.7; max-width: 600px; }
  .url { position: absolute; bottom: 40px; right: 60px;
    font-family: 'IBM Plex Mono', monospace; font-size: 16px; color: #999; }
  .emoji { position: absolute; top: 40px; right: 60px; font-size: 48px; opacity: 0.8; }
  .features { display: flex; gap: 16px; margin-top: 24px; }
  .feat { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #888;
    background: rgba(208,32,32,0.06); border-radius: 6px; padding: 6px 14px; }
</style>
</head>
<body>
  <div class="accent"></div>
  <div class="container">
    <div class="badge"><span>Attendance Management</span></div>
    <h1><em>勤怠</em>管理システム</h1>
    <p class="sub">社員の勤怠打刻・照会・修正・シフト申請を<br/>オンラインで完結する業務 Web アプリ</p>
    <div class="features">
      <span class="feat">Firebase Auth</span>
      <span class="feat">Firestore</span>
      <span class="feat">Cloud Functions</span>
      <span class="feat">PDF出力</span>
    </div>
  </div>
  <div class="emoji">🕐</div>
  <div class="url">ams.kojinius.jp</div>
</body>
</html>
