<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=IBM+Plex+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0f0e0d;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 50% 50% at 15% 85%, rgba(212,175,55,0.10), transparent),
      radial-gradient(ellipse 40% 40% at 85% 15%, rgba(212,175,55,0.05), transparent);
  }
  .accent { position: absolute; left: 0; top: 0; width: 6px; height: 100%;
    background: linear-gradient(180deg, #d4af37, #b8941e, #d4af37); }
  .container { position: relative; z-index: 1; display: flex; flex-direction: column;
    justify-content: center; height: 100%; padding: 60px 80px 60px 60px; margin-left: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 8px;
    background: rgba(212,175,55,0.12); border: 1px solid rgba(212,175,55,0.3);
    border-radius: 999px; padding: 8px 20px; width: fit-content; margin-bottom: 24px; }
  .badge span { font-family: 'IBM Plex Mono', monospace; font-size: 14px;
    font-weight: 500; color: #d4af37; letter-spacing: 0.08em; text-transform: uppercase; }
  h1 { font-family: 'Fraunces', serif; font-size: 56px; font-weight: 800;
    color: #faf3e0; line-height: 1.2; margin-bottom: 16px; letter-spacing: -0.02em; }
  h1 em { font-style: normal; color: #d4af37; }
  .sub { font-size: 18px; color: #a09080; line-height: 1.7; max-width: 600px; }
  .url { position: absolute; bottom: 40px; right: 60px;
    font-family: 'IBM Plex Mono', monospace; font-size: 16px; color: #706050; }
  .emoji { position: absolute; top: 40px; right: 60px; font-size: 48px; opacity: 0.8; }
</style>
</head>
<body>
  <div class="accent"></div>
  <div class="container">
    <div class="badge"><span>Portfolio Platform</span></div>
    <h1><em>Hirak</em>e</h1>
    <p class="sub">デザイン部メンバーの作品を一元管理・公開する<br/>ポートフォリオプラットフォーム</p>
  </div>
  <div class="emoji">🎨</div>
  <div class="url">hirake.kojinius.jp</div>
</body>
</html>
